<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fruit Ninja - Fixed Edition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            font-family: 'Arial Black', sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            background-size: cover;
            background-position: center;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .hidden { display: none !important; }

        #main-menu {
            background: rgba(0,0,0,0.4);
        }
        .logo {
            font-size: 42px;
            color: #e74c3c;
            text-shadow: 3px 3px 0 #f39c12, -2px -2px 0 #000;
            margin-bottom: 50px;
            text-align: center;
            transform: rotate(-5deg);
        }
        .logo span { color: #2ecc71; }
        
        /* Кнопки теперь имеют pointer-events: auto, чтобы точно ловить клики */
        .menu-btn {
            background: #e67e22;
            color: white;
            border: 4px solid #d35400;
            border-radius: 30px;
            padding: 15px 40px;
            font-size: 24px;
            cursor: pointer;
            margin: 10px;
            min-width: 200px;
            text-align: center;
            text-shadow: 2px 2px 0 #000;
            box-shadow: 0 5px 0 #a04000;
            pointer-events: auto; 
        }
        .menu-btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #a04000;
        }

        #shop-screen {
            background: rgba(20, 10, 5, 0.98);
            color: white;
            padding: 20px;
            justify-content: flex-start;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .shop-header {
            font-size: 28px;
            color: #f1c40f;
            margin: 20px 0 10px 0;
            text-shadow: 2px 2px 0 #000;
        }
        .currency {
            font-size: 20px;
            color: #2ecc71;
            margin-bottom: 20px;
        }
        .shop-section {
            width: 100%;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 18px;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 5px;
            margin-bottom: 10px;
            color: #e67e22;
        }
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }
        .shop-item {
            background: #2c3e50;
            border: 3px solid #34495e;
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .shop-item.active { border-color: #2ecc71; background: #27ae60; }
        .shop-item.purchased:not(.active) { border-color: #f1c40f; }
        .item-name { font-size: 14px; margin-bottom: 8px; }
        .item-price { font-size: 12px; color: #f1c40f; font-weight: bold; }

        #gui {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 5;
        }
        .stat {
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 0 #000;
        }
        #combo-text {
            position: absolute;
            font-size: 30px;
            color: #f1c40f;
            text-shadow: 2px 2px #000;
            font-weight: bold;
            pointer-events: none;
            z-index: 6;
            animation: pop 0.5s ease-out forwards;
        }
        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="gui" class="hidden">
        <div id="score-display" class="stat">Очки: 0</div>
        <div id="coins-display" class="stat" style="color: #f1c40f;">💰: 0</div>
    </div>

    <div id="main-menu" class="screen">
        <div class="logo">FRUIT<br><span>NINJA</span></div>
        <div class="menu-btn" id="start-btn">ИГРАТЬ</div>
        <div class="menu-btn" id="shop-btn">МАГАЗИН</div>
    </div>

    <div id="shop-screen" class="screen hidden">
        <div class="shop-header">КУЗНИЦА И КЛАН</div>
        <div class="currency" id="shop-coins">Монеты: 0</div>
        
        <div class="shop-section">
            <div class="section-title">Задний фон</div>
            <div class="shop-grid" id="bg-grid"></div>
        </div>

        <div class="shop-section">
            <div class="section-title">Эффекты Лезвия</div>
            <div class="shop-grid" id="blade-grid"></div>
        </div>

        <div class="menu-btn" id="back-btn" style="font-size: 18px; padding: 10px; min-width: 150px; margin-top: 20px;">НАЗАД</div>
    </div>
</div>
